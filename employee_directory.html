<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Employee Directory | Hart County</title>

  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/employee_directory.css" />

  <script defer src="js/lang.js"></script>
  <script defer src="js/content_loader.js"></script>
  <script defer src="js/app.js"></script>
  <script defer src="js/employee_directory.js"></script>
</head>

<body>

  <a class="skip-link" href="#main">Skip to main content</a>

  <main id="main" class="container">

    <div class="pageHead">
      <h1 class="pageTitle">Employee Directory</h1>
      <p class="pageSub">Hart County Employee Contact List</p>
    </div>

    <section class="card">
      <div class="directorySheetWrap">
        <table class="directorySheet">
          <thead>
            <tr class="sheetHeaderMain">
              <th colspan="3">DEPARTMENT NAME</th>
            </tr>
            <tr>
              <th>Name</th>
              <th>Number</th>
              <th>Extension</th>
            </tr>
          </thead>
          <tbody id="employeeDirectoryTable"></tbody>
        </table>
      </div>
    </section>

  </main>

</body>
</html>
